services:
  - type: web
    name: agentsuite-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    workingDir: backend
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_ireZ9TtLB7aH@ep-round-water-atfpaesr-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://agentsuite-frontend.onrender.com"
      - key: DEBUG
        value: "false"

  - type: web
    name: agentsuite-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    workingDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://agentsuite-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html